<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0C0C0E">
<title>StoryHaven AI — Forge worlds. Remember everything.</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230C0C0E'/%3E%3Ctext x='32' y='45' font-size='36' text-anchor='middle' fill='%23E3BD6C' font-family='Georgia,serif'%3E%E2%9D%96%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js" integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.11/purify.min.js" integrity="sha384-Ic7KEGROu37YaruU6NyiYeib7UhjFyDZQ5fzBAji965L75T/4LGk5nzwMEjNGexs" crossorigin="anonymous"></script>
</head>
<body class="unauthed">
<!-- mobile-only fixed top bar -->
<div class="mtop">
  <button class="hamb" id="mHamb" aria-label="Menu">☰</button>

  <div class="brand">
    <span class="glyph">❖</span>
    <a href="#/" class="brand-text">
      <span class="name">StoryHaven AI</span>
      <span class="tagline" data-i18n="tagline">Forge worlds. Remember everything.</span>
    </a>
  </div>

  <button class="gear" id="mGear" aria-label="Settings">⚙</button>
</div>

<div class="shell">
  <div class="scrim-nav" id="scrimNav"></div>
  <aside class="rail" id="rail">
    <div class="brand">
      <button type="button" class="glyph" id="railGlyphBtn" aria-label="Toggle sidebar" title="Toggle sidebar">
        <span class="glyph-icon">❖</span>
        <svg class="glyph-expand" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <a href="#/" class="brand-text">
        <span class="name">StoryHaven AI</span>
        <span class="tagline" data-i18n="tagline">Forge worlds. Remember everything.</span>
      </a>
      <button type="button" class="rail-collapse-btn" id="railCollapseBtn" aria-label="Collapse sidebar" title="Collapse sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
    <nav class="nav" id="nav">
      <a href="#/" data-route="library">▤ <span data-i18n="nav_library">Library</span></a>
      <a href="#/community" data-route="community">⊹ <span data-i18n="nav_community">Community</span></a>
      <a href="#/personas" data-route="personas">☺ <span data-i18n="nav_personas">Personas</span></a>
      <a href="#/gallery" data-route="gallery">🖼 <span data-i18n="nav_gallery">Image Gallery</span></a>
      <a href="#/imagegen" data-route="imagegen">🎨 <span data-i18n="nav_imagegen">Generate Image</span></a>
      <a href="#/admin" data-route="admin" id="adminNavLink" style="display:none;">⚑ <span data-i18n="nav_admin">Admin</span></a>
      <a href="#/create" class="new">+ <span data-i18n="nav_new_character">New character</span></a>
    </nav>
    <div class="label"><span data-i18n="recent_chats">Recent chats</span></div>
    <div class="recent" id="recent"></div>
    <div class="foot">
      <button type="button" id="railAvaBtn" class="rail-ava-btn" aria-label="Account" title="Account"></button>
      <div id="userInfo" class="user-info-empty" style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--line);"></div>
      <button id="settingsBtn">⚙ <span data-i18n="btn_settings">Settings</span></button>
      <button id="themeBtn" style="margin-top:8px;">☾ <span data-i18n="theme_dark_mode">Dark mode</span></button>
      <div class="conn" id="conn"><span class="d"></span><span id="connText" data-i18n="conn_checking">checking…</span></div>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>

<!-- mobile-only bottom tab bar -->
<nav class="tabbar" id="tabbar">
  <a href="#/" data-route="library"><span class="ic">▤</span><span data-i18n="nav_library">Library</span></a>
  <a href="#/community" data-route="community"><span class="ic">⊹</span><span data-i18n="nav_community">Community</span></a>
  <a href="#/create" data-route="create"><span class="ic">+</span><span data-i18n="btn_new">New</span></a>
  <a href="#" id="tabMenu"><span class="ic">☰</span><span data-i18n="nav_more">More</span></a>
</nav>

<div class="scrim" id="scrim"></div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
