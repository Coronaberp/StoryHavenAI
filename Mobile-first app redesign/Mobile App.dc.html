<style>
  html,body{margin:0;padding:0;background:#08080a;-webkit-font-smoothing:antialiased;}
  *{box-sizing:border-box;}
  body{font-family:var(--sans),Inter,system-ui,sans-serif;color:var(--ink);}
  a{color:var(--accent);text-decoration:none;}
  a:hover{color:var(--accent-deep);}
  .noscroll{scrollbar-width:none;-ms-overflow-style:none;}
  .noscroll::-webkit-scrollbar{width:0;height:0;display:none;}
  .sh-in{animation:sh-rise .32s cubic-bezier(.2,.7,.3,1) both;}
  @keyframes sh-rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @keyframes sh-blink{50%{opacity:.2;}}
  @keyframes sh-draw{from{transform:translateX(-102%);}to{transform:translateX(0);}}
  @keyframes sh-fade{from{opacity:0;}to{opacity:1;}}
  @keyframes sh-pop{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
  @keyframes sh-ember{0%{transform:translateY(0) translateX(0);opacity:0;}12%{opacity:.9;}100%{transform:translateY(-260px) translateX(var(--dx,14px));opacity:0;}}
  @keyframes sh-glow{0%,100%{opacity:.5;}50%{opacity:1;}}
  @keyframes sh-float{0%,100%{transform:translateY(0) rotate(var(--rot,0deg));}50%{transform:translateY(-10px) rotate(var(--rot,0deg));}}
  @keyframes sh-caret{0%,100%{box-shadow:0 0 0 3px var(--accent-soft);}50%{box-shadow:0 0 0 3px transparent;}}
  @keyframes sh-spin{to{transform:rotate(360deg);}}
  @keyframes sh-spin-rev{to{transform:rotate(-360deg);}}
  @keyframes sh-emblem{from{opacity:0;transform:scale(.86);}to{opacity:1;transform:scale(1);}}
  @keyframes sh-pulse{0%,100%{opacity:.4;transform:scale(1);}50%{opacity:.85;transform:scale(1.12);}}
  @keyframes sh-orbit{from{transform:rotate(0) translateX(var(--rad,86px)) rotate(0);}to{transform:rotate(360deg) translateX(var(--rad,86px)) rotate(-360deg);}}
</style>

<div style="min-height:100vh;width:100%;display:flex;align-items:flex-start;justify-content:center;gap:56px;padding:54px 40px 90px;background:radial-gradient(1100px 640px at 32% -12%, #17130b 0%, #08080a 58%);">

  <!-- ============ REVIEW JUMPER ============ -->
  <aside style="position:sticky;top:54px;width:212px;flex:none;padding-top:6px;">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:22px;">
      <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(150deg,var(--violet),var(--violet-deep));display:grid;place-items:center;color:var(--gold-ink);font-family:var(--display);font-weight:700;font-size:17px;">S</div>
      <div>
        <div style="font-family:var(--display);font-weight:600;font-size:15px;color:var(--ink);line-height:1;">StoryHaven</div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:3px;">Mobile · redesign</div>
      </div>
    </div>
    <div style="font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:0 0 10px 2px;">Jump to screen</div>
    <nav style="display:flex;flex-direction:column;gap:3px;">
      <sc-for list="{{ jumpItems }}" as="j" hint-placeholder-count="9">
        <a onClick="{{ j.go }}" style="{{ j.style }}">
          <span style="font-family:var(--mono);font-size:10px;opacity:.5;width:16px;">{{ j.num }}</span>
          <span>{{ j.label }}</span>
        </a>
      </sc-for>
    </nav>
    <div style="margin-top:22px;padding-top:16px;border-top:1px solid var(--line);font-size:11.5px;line-height:1.6;color:var(--muted);">
      Tap the phone to move through the flow. Bottom bar switches top-level tabs; the <span style="color:var(--sec);">＋</span> creates, and the menu opens the drawer.
    </div>
  </aside>

  <!-- ============ PHONE ============ -->
  <div style="position:relative;flex:none;">
    <div style="position:relative;width:392px;height:848px;border-radius:52px;background:linear-gradient(160deg,#2a2a2f,#101012);padding:13px;box-shadow:0 2px 4px rgba(0,0,0,.6),0 40px 90px -30px rgba(0,0,0,.9),inset 0 0 0 1px rgba(255,255,255,.05);">
      <div style="position:relative;width:100%;height:100%;border-radius:40px;overflow:hidden;background:var(--paper);display:flex;flex-direction:column;">

        <!-- status bar -->
        <div style="position:absolute;top:0;left:0;right:0;height:46px;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:0 26px;pointer-events:none;">
          <span style="font-family:var(--sans);font-weight:600;font-size:14px;color:var(--ink);letter-spacing:.02em;">9:41</span>
          <div style="position:absolute;left:50%;top:9px;transform:translateX(-50%);width:104px;height:26px;background:#000;border-radius:16px;"></div>
          <div style="display:flex;align-items:center;gap:6px;color:var(--ink);">
            <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4.5" y="5" width="3" height="6" rx="1"/><rect x="9" y="2.5" width="3" height="8.5" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></svg>
            <svg width="16" height="11" viewBox="0 0 16 11" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 4.2A9 9 0 0 1 15 4.2M3.4 6.6a5.6 5.6 0 0 1 9.2 0M6 9a2.2 2.2 0 0 1 4 0" stroke-linecap="round"/></svg>
            <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="1" y="1" width="20" height="10" rx="3" stroke="currentColor" stroke-opacity=".5"/><rect x="3" y="3" width="15" height="6" rx="1.5" fill="currentColor"/><rect x="22.5" y="4" width="1.6" height="4" rx=".8" fill="currentColor" fill-opacity=".5"/></svg>
          </div>
        </div>

        <!-- screen viewport -->
        <div style="position:relative;flex:1;min-height:0;">{{ screenEl }}</div>

        <!-- bottom tab bar -->
        <sc-if value="{{ showTabs }}" hint-placeholder-val="{{ true }}">
        <div style="position:absolute;bottom:0;left:0;right:0;z-index:30;background:linear-gradient(to top, var(--surface-2) 72%, transparent);padding:8px 14px calc(env(safe-area-inset-bottom,10px) + 10px);">
          <div style="display:flex;align-items:flex-end;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:8px 10px;box-shadow:0 12px 30px -14px rgba(0,0,0,.7);">
            <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="5">
              {{ t.el }}
            </sc-for>
          </div>
        </div>
        </sc-if>

        <!-- global settings modal -->
        <sc-if value="{{ settingsOpen }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute;inset:0;z-index:62;">
          <div onClick="{{ closeSettings }}" style="position:absolute;inset:0;background:rgba(4,4,6,.72);backdrop-filter:blur(3px);animation:sh-fade .2s both;"></div>
          <div style="position:absolute;left:14px;right:14px;top:52px;bottom:16px;">{{ settingsCardEl }}</div>
        </div>
        </sc-if>

        <!-- create sheet -->
        <sc-if value="{{ sheetOpen }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute;inset:0;z-index:60;">
          <div onClick="{{ closeSheet }}" style="position:absolute;inset:0;background:rgba(4,4,6,.66);animation:sh-fade .2s both;"></div>
          <div style="position:absolute;left:0;right:0;bottom:0;background:var(--surface-2);border-top:1px solid var(--line);border-radius:24px 24px 0 0;animation:sh-rise .3s cubic-bezier(.2,.7,.3,1) both;padding:12px 18px calc(env(safe-area-inset-bottom,14px) + 18px);">{{ sheetEl }}</div>
        </div>
        </sc-if>

      </div>
    </div>
  </div>
</div>

function md(text){
  const out=[]; const re=/\*\*([^*]+)\*\*|\*([^*]+)\*|\u201C([^\u201D]+)\u201D/g;
  let last=0,m,k=0;
  while((m=re.exec(text))){
    if(m.index>last) out.push(text.slice(last,m.index));
    if(m[1]!==undefined) out.push(h('strong',{key:k++,style:{color:A.ink,fontWeight:700}},m[1]));
    else if(m[2]!==undefined) out.push(h('em',{key:k++,style:{color:A.sec,fontStyle:'italic'}},m[2]));
    else out.push(h('span',{key:k++,style:{color:A.ink}},'\u201C'+m[3]+'\u201D'));
    last=re.lastIndex;
  }
  if(last<text.length) out.push(text.slice(last));
  return out;
}

  advanced(){ const s=this.state; return h('div',{style:{marginBottom:8,border:'1px solid '+A.line,borderRadius:14,overflow:'hidden'}},
    h('button',{onClick:()=>this.setState({advOpen:!s.advOpen}),style:{width:'100%',display:'flex',alignItems:'center',gap:9,padding:'13px 14px',background:A.surface,border:'none',cursor:'pointer',color:A.ink}},
      h('span',{style:{color:A.sec,display:'flex'}},ICON.sliders(17)), h('span',{style:{flex:1,textAlign:'left',fontFamily:A.sans,fontSize:14,fontWeight:500}},'Advanced'),

        h('div',{style:{display:'flex',gap:8}},

    ) : null); }

    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',margin:'0 2px 10px'}},

    h('div',{className:'noscroll',style:{display:'flex',gap:10,overflowX:'auto',paddingBottom:4}}, s.genResults.map(r=>h('button',{key:r.id,onClick:()=>this.setState({genLast:r}),style:{flex:'none',width:84,height:84,borderRadius:12,border:'1px solid '+A.line,overflow:'hidden',position:'relative',cursor:'pointer',padding:0,background:'linear-gradient(150deg,hsl('+r.hue+' 55% 46%),hsl('+((r.hue+40)%360)+' 50% 22%))'}},

  genBar(){ const s=this.state; const busy=s.genBusy; return h('div',{style:{position:'absolute',bottom:0,left:0,right:0,zIndex:25,padding:'12px 16px calc(env(safe-area-inset-bottom,12px) + 12px)',background:'linear-gradient(to top, var(--surface-2) 74%, transparent)'}},
    h('div',{style:{display:'flex',alignItems:'center',gap:12}},

  galTile(r){ const bl=this.state.matureEnabled&&this.state.privacyMode&&r.nsfw; return h('button',{key:r.id,onClick:()=>this.openGen(r.video?'txt2vid':'txt2img', r.prompt, 'gallery'),style:{position:'relative',aspectRatio:this.arCss(r.aspect||'1:1'),borderRadius:14,overflow:'hidden',border:'1px solid '+A.line,cursor:'pointer',padding:0,background:A.surface}},

      h('div',{style:{width:44,height:44,flex:'none',borderRadius:12,display:'grid',placeItems:'center',color:A.goldInk,background:'linear-gradient(150deg,hsl('+hue+' 55% 42%),hsl('+hue+' 50% 22%))'}}, icon),

  renderVals(){
    const s=this.state.screen;
    const top=['library','chats','creations','personas','forum'];
    const screenMap={ login:()=>this.loginEl(), library:()=>this.libraryEl(), chats:()=>this.chatsEl(), chat:()=>this.chatEl(), dossier:()=>this.dossierEl(), creations:()=>this.creationsEl(), personas:()=>this.personasEl(), create:()=>this.createEl(), generate:()=>this.genEl(), gallery:()=>this.galleryEl(), forum:()=>this.forumEl(), admin:()=>this.adminEl(), e404:()=>this.errorEl('404'), e401:()=>this.errorEl('401'), e403:()=>this.errorEl('403'), e500:()=>this.errorEl('500'), e503:()=>this.errorEl('503') };
    const jump=[['01','Sign in','__signin'],['02','Register','__register'],['03','TOTP enroll','__enroll'],['04','Forgot · TOTP','__forgot'],['05','Library','library'],['06','Character dossier','dossier'],['07','Chat thread','chat'],['08','RPG campaign','__rpg'],['09','Image studio','__gen_img'],['10','Inpaint \u00b7 mask paint','__gen_inpaint'],['11','Video generation','__gen_vid'],['12','Output gallery','gallery'],['13','Chats (recents)','chats'],['14','Creations','creations'],['15','New character','create'],['16','Personas','personas'],['17','Community forum','forum'],['18','Admin panel','admin'],['19','Settings (modal)','__settings'],['20','404 not found','e404'],['21','401 unauthorized','e401'],['22','403 forbidden','e403'],['23','500 server error','e500'],['24','503 unavailable','e503']];

      closeSettings:()=>this.setState({settingsOpen:false}),

        {el:h('button',{key:'t3',onClick:()=>this.setState({sheetOpen:true}),style:{flex:'none',marginTop:-22,width:54,height:54,borderRadius:17,border:'none',background:'linear-gradient(150deg,var(--violet),var(--violet-deep))',color:A.goldInk,display:'grid',placeItems:'center',cursor:'pointer',boxShadow:'0 8px 20px -6px hsl(40 60% 40%)'}}, ICON.plus(26))},

          style:'display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:9px;cursor:pointer;font-size:13px;font-family:var(--sans);text-decoration:none;'+(act?'color:var(--accent);background:var(--accent-tint);':'color:var(--sec);background:transparent;'),
          go:()=>{ const authMap={__signin:'signin',__register:'register',__enroll:'enroll',__forgot:'forgot'}; if(authMap[j[2]]){ this.setState({screen:'login',settingsOpen:false,drawerOpen:false}); this.setAuthView(authMap[j[2]]); this.scrollTop(); } else if(j[2]==='__rpg'){ this.startChat('gm-thornreach'); } else if(j[2]==='dossier'){ this.openChar('aria'); } else if(j[2]==='chat'){ this.startChat('aria'); } else if(j[2]==='__gen_img'){ this.openGen('txt2img',null,'library'); } else if(j[2]==='__gen_inpaint'){ this.openGen('inpaint',null,'library'); } else if(j[2]==='__gen_vid'){ this.openGen('txt2vid',null,'library'); } else if(j[2]==='gallery'){ this.setState({screen:'gallery',genReturn:'library'}); this.scrollTop(); } else if(j[2]==='__settings'){ this.setState({settingsOpen:true}); } else { this.go(j[2]); } }
