<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0C0C0E">
<title>StoryHaven AI</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js" integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi" crossorigin="anonymous" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.11/purify.min.js" integrity="sha384-Ic7KEGROu37YaruU6NyiYeib7UhjFyDZQ5fzBAji965L75T/4LGk5nzwMEjNGexs" crossorigin="anonymous" defer></script>
</head>
<body class="min-h-screen bg-paper text-ink font-sans">
  <div class="flex min-h-screen flex-col md:flex-row">
    <aside id="sidebar" class="flex-col w-60 border-r border-line p-4" style="display:none">
      <a href="/compendium" onclick="event.preventDefault();navigate('/compendium')" class="flex items-center gap-2 text-primary">
        <svg viewBox="0 0 500 500" class="h-9 w-9 shrink-0"><g>
          <circle cx="250" cy="250" r="230" fill="none" stroke="currentColor" stroke-width="8" opacity="0.15"/>
          <circle cx="250" cy="250" r="210" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="6 12" opacity="0.4"/>
          <path d="M 250 40 L 420 138 L 420 362 L 250 460 L 80 362 L 80 138 Z" fill="none" stroke="currentColor" stroke-width="10" stroke-linejoin="round"/>
          <path d="M 250 75 L 385 153 L 385 347 L 250 425 L 115 347 L 115 153 Z" fill="none" stroke="currentColor" stroke-width="2" opacity="0.3"/>
          <circle cx="250" cy="40" r="6" fill="currentColor"/>
          <circle cx="420" cy="138" r="6" fill="currentColor"/>
          <circle cx="420" cy="362" r="6" fill="currentColor"/>
          <circle cx="250" cy="460" r="6" fill="currentColor"/>
          <circle cx="80" cy="362" r="6" fill="currentColor"/>
          <circle cx="80" cy="138" r="6" fill="currentColor"/>
          <circle cx="195" cy="150" r="10" fill="currentColor" opacity="0.9"/>
          <line x1="145" y1="150" x2="225" y2="150" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <line x1="195" y1="120" x2="195" y2="180" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
          <circle cx="305" cy="150" r="35" fill="none" stroke="currentColor" stroke-width="10"/>
          <circle cx="305" cy="150" r="30" fill="currentColor" opacity="0.15"/>
          <path d="M 285 130 A 20 20 0 0 1 325 135" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
          <circle cx="346" cy="150" r="5" fill="none" stroke="currentColor" stroke-width="3"/>
          <line x1="350" y1="150" x2="350" y2="340" stroke="currentColor" stroke-width="3" stroke-dasharray="6 6" opacity="0.7"/>
          <path d="M 130 230 C 170 190, 220 200, 250 215 C 280 200, 330 190, 370 230 C 330 260, 280 240, 250 230 C 220 240, 170 260, 130 230 Z" fill="currentColor"/>
          <circle cx="350" cy="340" r="6" fill="currentColor"/>
          <circle cx="350" cy="340" r="12" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
          <path d="M 120 370 C 160 400, 220 390, 250 340 C 280 390, 340 400, 380 370 V 300 C 340 330, 280 320, 250 270 C 220 320, 160 330, 120 300 Z" fill="none" stroke="currentColor" stroke-width="12" stroke-linejoin="round"/>
          <path d="M 150 350 C 180 370, 220 365, 250 325 C 280 365, 320 370, 350 350 V 295 C 320 315, 280 310, 250 270 C 220 310, 180 315, 150 295 Z" fill="none" stroke="currentColor" stroke-width="6" opacity="0.6"/>
          <path d="M 180 330 C 200 345, 230 340, 250 310 C 270 340, 300 345, 320 330 V 290 C 300 305, 270 300, 250 270 C 230 300, 200 305, 180 290 Z" fill="none" stroke="currentColor" stroke-width="3" opacity="0.3"/>
          <line x1="250" y1="270" x2="250" y2="445" stroke="currentColor" stroke-width="12" stroke-linecap="round"/>
        </g></svg>
        <span class="flex flex-col leading-tight">
          <span class="font-display text-base font-semibold tracking-wide">StoryHaven AI</span>
          <span class="text-[10px] italic text-muted">Forge worlds. Remember everything.</span>
        </span>
      </a>
      <nav id="nav" class="mt-6 flex flex-1 flex-col gap-1 text-sm">
        <button type="button" data-route="compendium" onclick="openCompendiumMenu()" class="text-left rounded-md px-3 py-2 hover:bg-surface-2">Compendium</button>
        <a href="/parlance" data-route="parlance" class="rounded-md px-3 py-2 hover:bg-surface-2">Parlance</a>
        <button type="button" data-route="sanctum" onclick="openSanctumMenu()" class="text-left rounded-md px-3 py-2 hover:bg-surface-2">Sanctum</button>
        <a href="/dossier" data-route="dossier" class="rounded-md px-3 py-2 hover:bg-surface-2">My Dossier</a>
      </nav>
    </aside>

    <header id="mobileHeader" class="fixed inset-x-0 top-0 z-10 flex items-center justify-between border-b border-line px-4 py-3 bg-paper md:hidden" style="display:none">
      <a href="/compendium" onclick="event.preventDefault();navigate('/compendium')" class="flex items-center gap-1.5 text-primary">
        <svg viewBox="0 0 500 500" class="h-7 w-7 shrink-0"><g>
          <circle cx="250" cy="250" r="230" fill="none" stroke="currentColor" stroke-width="8" opacity="0.15"/>
          <circle cx="250" cy="250" r="210" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="6 12" opacity="0.4"/>
          <path d="M 250 40 L 420 138 L 420 362 L 250 460 L 80 362 L 80 138 Z" fill="none" stroke="currentColor" stroke-width="10" stroke-linejoin="round"/>
          <path d="M 250 75 L 385 153 L 385 347 L 250 425 L 115 347 L 115 153 Z" fill="none" stroke="currentColor" stroke-width="2" opacity="0.3"/>
          <circle cx="250" cy="40" r="6" fill="currentColor"/>
          <circle cx="420" cy="138" r="6" fill="currentColor"/>
          <circle cx="420" cy="362" r="6" fill="currentColor"/>
          <circle cx="250" cy="460" r="6" fill="currentColor"/>
          <circle cx="80" cy="362" r="6" fill="currentColor"/>
          <circle cx="80" cy="138" r="6" fill="currentColor"/>
          <circle cx="195" cy="150" r="10" fill="currentColor" opacity="0.9"/>
          <line x1="145" y1="150" x2="225" y2="150" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <line x1="195" y1="120" x2="195" y2="180" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
          <circle cx="305" cy="150" r="35" fill="none" stroke="currentColor" stroke-width="10"/>
          <circle cx="305" cy="150" r="30" fill="currentColor" opacity="0.15"/>
          <path d="M 285 130 A 20 20 0 0 1 325 135" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
          <circle cx="346" cy="150" r="5" fill="none" stroke="currentColor" stroke-width="3"/>
          <line x1="350" y1="150" x2="350" y2="340" stroke="currentColor" stroke-width="3" stroke-dasharray="6 6" opacity="0.7"/>
          <path d="M 130 230 C 170 190, 220 200, 250 215 C 280 200, 330 190, 370 230 C 330 260, 280 240, 250 230 C 220 240, 170 260, 130 230 Z" fill="currentColor"/>
          <circle cx="350" cy="340" r="6" fill="currentColor"/>
          <circle cx="350" cy="340" r="12" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
          <path d="M 120 370 C 160 400, 220 390, 250 340 C 280 390, 340 400, 380 370 V 300 C 340 330, 280 320, 250 270 C 220 320, 160 330, 120 300 Z" fill="none" stroke="currentColor" stroke-width="12" stroke-linejoin="round"/>
          <path d="M 150 350 C 180 370, 220 365, 250 325 C 280 365, 320 370, 350 350 V 295 C 320 315, 280 310, 250 270 C 220 310, 180 315, 150 295 Z" fill="none" stroke="currentColor" stroke-width="6" opacity="0.6"/>
          <path d="M 180 330 C 200 345, 230 340, 250 310 C 270 340, 300 345, 320 330 V 290 C 300 305, 270 300, 250 270 C 230 300, 200 305, 180 290 Z" fill="none" stroke="currentColor" stroke-width="3" opacity="0.3"/>
          <line x1="250" y1="270" x2="250" y2="445" stroke="currentColor" stroke-width="12" stroke-linecap="round"/>
        </g></svg>
        <span class="flex flex-col leading-tight">
          <span class="font-display text-sm font-semibold tracking-wide">StoryHaven AI</span>
          <span class="text-[9px] italic text-muted">Forge worlds. Remember everything.</span>
        </span>
      </a>
      <button id="mGear" class="text-sec" aria-label="Settings">⚙</button>
    </header>

    <main id="main" class="flex-1 overflow-y-auto p-4 pt-[68px] pb-20 md:pt-4 md:pb-4"></main>

    <nav id="bottomNav" class="fixed inset-x-0 bottom-0 z-10 border-t-2 border-line-2 bg-paper" style="display:none">
      <div id="navRibbon" class="absolute -top-2.5 h-[18px] transition-[left,width] duration-300 ease-out motion-reduce:transition-none" style="clip-path:polygon(22% 0%,78% 0%,78% 74%,50% 100%,22% 74%);background:linear-gradient(180deg, var(--color-primary-light), var(--color-primary-dark));filter:drop-shadow(0 2px 3px rgba(0,0,0,.35))"></div>
      <div class="relative flex items-center">
        <button type="button" data-route="compendium" onclick="openCompendiumMenu()" class="flex flex-1 flex-col items-center gap-1 py-2.5 text-sec">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="16" rx="2"/><path d="M9 4v6l3-2 3 2V4"/></svg>
          <span class="font-mono text-[9px] tracking-[.12em] uppercase">Compendium</span>
        </button>
        <a href="/parlance" data-route="parlance" class="flex flex-1 flex-col items-center gap-1 py-2.5 text-sec">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h9a3 3 0 0 1 3 3v11"/><path d="M6 4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12"/><path d="M9 9h6M9 12.5h6"/></svg>
          <span class="font-mono text-[9px] tracking-[.12em] uppercase">Parlance</span>
        </a>
        <button type="button" onclick="navigate('/create')" title="New character"
          class="flex-none -mt-[22px] w-[54px] h-[54px] rounded-2xl grid place-items-center text-paper"
          style="background:linear-gradient(150deg, var(--color-accent), var(--color-accent-deep));box-shadow:0 8px 18px -6px color-mix(in srgb, var(--color-accent) 55%, transparent)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button type="button" data-route="sanctum" onclick="openSanctumMenu()" class="flex flex-1 flex-col items-center gap-1 py-2.5 text-sec">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 20V11a6 6 0 0 1 12 0v9"/><path d="M6 20h12"/><path d="M12 15v2.5"/></svg>
          <span class="font-mono text-[9px] tracking-[.12em] uppercase">Sanctum</span>
        </button>
        <a href="/dossier" data-route="dossier" class="flex flex-1 flex-col items-center gap-1 py-2.5 text-sec">
          <span data-avatar-ring class="relative block w-[22px] h-[22px] rounded-full p-[2px] opacity-70" style="background:var(--nav-avatar-ring, linear-gradient(135deg, var(--color-primary-light), var(--color-primary-dark)))">
            <span class="block w-full h-full rounded-full overflow-hidden bg-surface-2 grid place-items-center">
              <img class="hidden w-full h-full object-cover" alt="">
              <span data-avatar-fallback class="font-mono text-[10px] text-ink">?</span>
            </span>
          </span>
          <span class="font-mono text-[9px] tracking-[.05em] uppercase whitespace-nowrap">My Dossier</span>
        </a>
      </div>
    </nav>
  </div>

  <div id="toast" class="toast"></div>
  <div id="heroChrome" class="hidden"></div>
  <div class="fixed top-2 right-2 z-[9999] flex items-center gap-1.5">
    <button type="button" id="censorToggle" onclick="cycleCensor()" title="Censor mature content"
      data-censor-icon
      class="hidden w-9 h-9 rounded-lg border border-line bg-surface text-primary grid place-items-center hover:bg-surface-2"></button>
    <button type="button" id="tempThemeCycle" onclick="cycleTheme()" title="Cycle theme (temp)"
      data-theme-icon
      class="w-9 h-9 rounded-lg border border-line bg-surface text-primary grid place-items-center hover:bg-surface-2"></button>
    <button type="button" id="tempLogout" onclick="api('/api/auth/logout', {method:'POST'}).catch(()=>{}).then(()=>{ME = null; navigate('/login');})" title="Log out"
      class="w-9 h-9 rounded-lg border border-line bg-surface text-sec grid place-items-center hover:bg-surface-2">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>

  <script src="/js/state-store.js" defer></script>
  <script src="/js/theme.js" defer></script>
  <script src="/js/app-session.js" defer></script>
  <script src="/js/login.js" defer></script>
  <script src="/js/auth-scene.js" defer></script>
  <script src="/js/qrcode-generator.js" defer></script>
  <script src="/js/register.js" defer></script>
  <script src="/js/onboard.js" defer></script>
  <script src="/js/wait.js" defer></script>
  <script src="/js/toast.js" defer></script>
  <script src="/js/modal.js" defer></script>
  <script src="/js/dropdown.js" defer></script>
  <script src="/js/pantheon.js" defer></script>
  <script src="/js/artisans.js" defer></script>
  <script src="/js/card-sandbox.js" defer></script>
  <script src="/js/profile-template.js" defer></script>
  <script src="/js/artisan-profile.js" defer></script>
  <script src="/js/compendium.js" defer></script>
  <script src="/js/nav-menus.js" defer></script>
  <script src="/js/router.js" defer></script>
  <script src="/js/boot.js" defer></script>
</body>
</html>
